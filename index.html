<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Vault Marketing Co — Website</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=Cormorant+SC:wght@300;400;500;600&family=Jost:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Jost', sans-serif; background: #FBF8F1; color: #3D332A; -webkit-font-smoothing: antialiased; }
  ::placeholder { color: rgba(61,51,42,0.3) !important; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #F5EFE3; }
  ::-webkit-scrollbar-thumb { background: rgba(168,139,92,0.4); border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="WhoWeAre.jsx"></script>
<script type="text/babel" src="Pillars.jsx"></script>
<script type="text/babel" src="Services.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" src="WorkPage.jsx"></script>
<script type="text/babel" src="ContactPage.jsx"></script>

<script type="text/babel">
// ─── About Page ───────────────────────────────────────────────
const AboutPage = ({ onNavigate }) => (
  <div style={{ background: '#FBF8F1', minHeight: '100vh', paddingTop: 72 }}>
    <div style={{ padding: '96px 48px 80px', borderBottom: '1px solid rgba(168,139,92,0.18)', position: 'relative', overflow: 'hidden', background: '#F5EFE3' }}>
      <div style={{ position: 'absolute', right: -60, top: '50%', transform: 'translateY(-50%)', fontFamily: "'Cormorant Garamond', serif", fontSize: 280, fontWeight: 700, color: 'rgba(168,139,92,0.06)', lineHeight: 1, userSelect: 'none', pointerEvents: 'none' }}>About</div>
      <div style={{ maxWidth: 1280, margin: '0 auto', position: 'relative' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 24 }}>
          <span style={{ display: 'inline-block', width: 32, height: 1, background: '#A88B5C' }}></span>
          <span style={{ fontFamily: "'Jost', sans-serif", fontSize: 9, fontWeight: 300, letterSpacing: '0.3em', textTransform: 'uppercase', color: '#A88B5C' }}>Our Story</span>
        </div>
        <h1 style={{ fontFamily: "'Cormorant Garamond', serif", fontWeight: 300, fontSize: 'clamp(44px, 6vw, 72px)', color: '#3D332A', lineHeight: 0.95, maxWidth: 720 }}>
          Built for brands<br /><em style={{ fontWeight: 700 }}>that mean business.</em>
        </h1>
      </div>
    </div>

    <div style={{ maxWidth: 1280, margin: '0 auto', padding: '96px 48px' }}>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 80, marginBottom: 96, alignItems: 'start' }}>
        <div>
          <div style={{ fontFamily: "'Jost', sans-serif", fontSize: 9, fontWeight: 300, letterSpacing: '0.28em', textTransform: 'uppercase', color: '#A88B5C', marginBottom: 20 }}>Our Philosophy</div>
          <h2 style={{ fontFamily: "'Cormorant Garamond', serif", fontWeight: 300, fontSize: 40, color: '#3D332A', lineHeight: 1.15, marginBottom: 28 }}>Most agencies hand you a content calendar.<br /><em style={{ fontWeight: 600 }}>We hand you a market.</em></h2>
          <p style={{ fontFamily: "'Jost', sans-serif", fontSize: 15, fontWeight: 300, color: '#6B5C4E', lineHeight: 1.85, marginBottom: 16, letterSpacing: '0.01em' }}>
            The Vault is not your average agency — and your brand is not average, so why settle? We're a boutique, full-service marketing and consulting firm built for owners and operators who play to win.
          </p>
          <p style={{ fontFamily: "'Jost', sans-serif", fontSize: 15, fontWeight: 300, color: '#6B5C4E', lineHeight: 1.85, letterSpacing: '0.01em' }}>
            We craft bespoke strategies that position your brand as the undeniable authority in your market — fusing the exclusivity of luxury branding with the bold energy of a one-of-a-kind, experience-first lifestyle.
          </p>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column' }}>
          {[['01', 'Brand DNA First', 'We start by understanding what makes your business singular — then we build every campaign on top of that foundation.'], ['02', 'Bespoke, Not Boilerplate', 'No template playbooks. Every strategy is engineered for your specific market, audience, and growth targets.'], ['03', 'Owners Talk to Owners', 'You work directly with senior strategists — not a junior account manager passing notes up the chain.']].map(([n, title, desc]) => (
            <div key={n} style={{ display: 'grid', gridTemplateColumns: '40px 1fr', gap: 20, padding: '28px 0', borderBottom: '1px solid rgba(168,139,92,0.18)' }}>
              <div style={{ fontFamily: "'Jost', sans-serif", fontSize: 9, fontWeight: 300, color: '#A88B5C', letterSpacing: '0.18em', paddingTop: 4 }}>{n}</div>
              <div>
                <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 24, fontWeight: 500, color: '#3D332A', marginBottom: 8 }}>{title}</div>
                <div style={{ fontFamily: "'Jost', sans-serif", fontSize: 13, fontWeight: 300, color: '#8C7B68', lineHeight: 1.75, letterSpacing: '0.02em' }}>{desc}</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div style={{ borderTop: '1px solid rgba(168,139,92,0.2)', paddingTop: 64 }}>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 0 }}>
          {[['Built For Operators', "We work with owners who run real businesses — not committees and brand managers.", '#D8DDC8'], ['Selective By Design', "We take on a limited number of clients each quarter to protect the quality of our work.", '#EFDDD3'], ['Aligned With Outcomes', "Awareness. Foot traffic. Revenue. We tie our strategy to the metrics that move your P&L.", '#EBE3D2']].map(([title, desc, swatch], i) => (
            <div key={title} style={{ padding: '40px 36px', borderRight: i < 2 ? '1px solid rgba(168,139,92,0.18)' : 'none' }}>
              <div style={{ width: 36, height: 36, background: swatch, borderRadius: '50%', marginBottom: 20 }}></div>
              <h3 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 22, fontWeight: 500, color: '#3D332A', marginBottom: 10, lineHeight: 1.2 }}>{title}</h3>
              <p style={{ fontFamily: "'Jost', sans-serif", fontSize: 13, fontWeight: 300, color: '#8C7B68', lineHeight: 1.75, letterSpacing: '0.02em' }}>{desc}</p>
            </div>
          ))}
        </div>
      </div>

      <div style={{ borderTop: '1px solid rgba(168,139,92,0.2)', marginTop: 64, paddingTop: 56, display: 'flex', justifyContent: 'center' }}>
        <button onClick={() => onNavigate('contact')} style={{ background: '#3D332A', color: '#FBF8F1', border: 'none', padding: '15px 44px', fontFamily: "'Jost', sans-serif", fontSize: 9, fontWeight: 400, letterSpacing: '0.26em', textTransform: 'uppercase', cursor: 'pointer', borderRadius: 2 }}>Work With Us</button>
      </div>
    </div>
  </div>
);

// ─── Home Page ────────────────────────────────────
const HomePage = ({ onNavigate }) => (
  <div>
    <Hero onNavigate={onNavigate} />
    <WhoWeAre onNavigate={onNavigate} />
    <Pillars />
    <Services onNavigate={onNavigate} />

    {/* Philosophy — soft sage */}
    <section style={{ background: '#D8DDC8', padding: '120px 48px', position: 'relative', overflow: 'hidden' }}>
      <div style={{ position: 'absolute', inset: 24, border: '1px solid rgba(168,139,92,0.25)', pointerEvents: 'none' }}></div>
      <div style={{ maxWidth: 960, margin: '0 auto', position: 'relative' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 14, marginBottom: 36 }}>
          <span style={{ display: 'inline-block', width: 32, height: 1, background: '#A88B5C' }}></span>
          <span style={{ fontFamily: "'Jost', sans-serif", fontSize: 9, fontWeight: 400, letterSpacing: '0.3em', textTransform: 'uppercase', color: '#A88B5C' }}>Our Core Philosophy</span>
          <span style={{ display: 'inline-block', width: 32, height: 1, background: '#A88B5C' }}></span>
        </div>
        <h2 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 'clamp(32px, 4vw, 48px)', fontStyle: 'italic', fontWeight: 300, color: '#3D332A', lineHeight: 1.25, marginBottom: 56, letterSpacing: '-0.01em', textAlign: 'center', maxWidth: 820, marginLeft: 'auto', marginRight: 'auto' }}>
          Every great brand has a story that deserves to be told boldly. At The Vault, we unlock that story and broadcast it to the audiences that matter most.
        </h2>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 0, borderTop: '1px solid rgba(168,139,92,0.3)' }}>
          {[
            ['Boutique Attention', 'Agency-Level Power'],
            ['Strategy Rooted', 'In Your Brand DNA'],
            ['Results Measured', 'In Real Growth'],
            ['Relationships Built', 'Not Just Campaigns'],
          ].map(([a, b], i) => (
            <div key={i} style={{ padding: '32px 20px', borderRight: i < 3 ? '1px solid rgba(168,139,92,0.3)' : 'none', textAlign: 'center' }}>
              <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 18, fontWeight: 600, color: '#3D332A', lineHeight: 1.35 }}>{a}</div>
              <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 18, fontWeight: 300, fontStyle: 'italic', color: '#6B5C4E', lineHeight: 1.35 }}>{b}</div>
            </div>
          ))}
        </div>
      </div>
    </section>

    {/* Industries — cinematic, layered over pool image */}
    <section style={{ position: 'relative', background: '#1F3A2E', overflow: 'hidden' }}>
      {/* Background image */}
      <div style={{
        position: 'absolute', inset: 0,
        backgroundImage: 'url(assets/pool-villa.jpg)',
        backgroundSize: 'cover', backgroundPosition: 'center',
      }}></div>
      {/* Dark gradient overlay for legibility */}
      <div style={{
        position: 'absolute', inset: 0,
        background: 'linear-gradient(180deg, rgba(20,30,26,0.55) 0%, rgba(20,30,26,0.65) 50%, rgba(20,30,26,0.85) 100%)',
      }}></div>

      <div style={{ position: 'relative', maxWidth: 1280, margin: '0 auto', padding: '140px 48px 0' }}>
        <div style={{ maxWidth: 760 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 24 }}>
            <span style={{ display: 'inline-block', width: 32, height: 1, background: '#C9A96E' }}></span>
            <span style={{ fontFamily: "'Jost', sans-serif", fontSize: 9, fontWeight: 400, letterSpacing: '0.3em', textTransform: 'uppercase', color: '#C9A96E' }}>Who We Serve</span>
          </div>
          <h2 style={{ fontFamily: "'Cormorant Garamond', serif", fontWeight: 300, fontSize: 'clamp(40px, 4.6vw, 64px)', color: '#FBF8F1', lineHeight: 1.02, letterSpacing: '-0.02em', marginBottom: 28 }}>
            Built for brands<br /><em style={{ fontWeight: 700, color: '#C9A96E' }}>where experience is everything.</em>
          </h2>
          <p style={{ fontFamily: "'Jost', sans-serif", fontSize: 16, fontWeight: 300, color: 'rgba(251,248,241,0.82)', lineHeight: 1.85, maxWidth: 580, letterSpacing: '0.02em' }}>
            From the gym floor to the club lounge, from the waterfront restaurant to the boutique hotel — we understand the psychology of high-end, experience-driven businesses, and what makes your clientele choose you over the competition.
          </p>
        </div>
      </div>

      {/* Industries grid — overlapping bottom card */}
      <div style={{ position: 'relative', maxWidth: 1280, margin: '120px auto 0', padding: '0 48px' }}>
        <div style={{
          background: '#FBF8F1',
          padding: '0',
          border: '1px solid rgba(168,139,92,0.25)', borderRadius: 2,
          boxShadow: '0 30px 60px -20px rgba(20,30,26,0.5)',
          marginBottom: -1,
        }}>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(6, 1fr)', gap: 0 }}>
            {['Gyms & Studios', 'Restaurants', 'Boutique Hotels', 'Nightlife & Clubs', 'Retail Boutiques', 'Wellness & Spa'].map((label, i) => (
              <div key={label} style={{ padding: '40px 16px', borderRight: i < 5 ? '1px solid rgba(168,139,92,0.25)' : 'none', textAlign: 'center' }}>
                <div style={{ fontFamily: "'Jost', sans-serif", fontSize: 8, fontWeight: 400, letterSpacing: '0.26em', textTransform: 'uppercase', color: '#A88B5C', marginBottom: 10 }}>0{i + 1}</div>
                <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 18, fontWeight: 600, color: '#3D332A', lineHeight: 1.3 }}>{label}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Spacer below the overlapping card */}
      <div style={{ height: 80, background: '#FBF8F1', position: 'relative' }}></div>
    </section>

    {/* Process — blush */}
    <section style={{ background: '#EFDDD3', padding: '120px 48px', position: 'relative', overflow: 'hidden' }}>
      <div style={{ position: 'absolute', inset: 24, border: '1px solid rgba(168,139,92,0.25)', pointerEvents: 'none' }}></div>
      <div style={{ position: 'relative', maxWidth: 1100, margin: '0 auto' }}>
        <div style={{ textAlign: 'center', marginBottom: 72 }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 14, marginBottom: 28 }}>
            <span style={{ display: 'inline-block', width: 32, height: 1, background: '#A88B5C' }}></span>
            <span style={{ fontFamily: "'Jost', sans-serif", fontSize: 9, fontWeight: 400, letterSpacing: '0.3em', textTransform: 'uppercase', color: '#A88B5C' }}>How We Work</span>
            <span style={{ display: 'inline-block', width: 32, height: 1, background: '#A88B5C' }}></span>
          </div>
          <h2 style={{ fontFamily: "'Cormorant Garamond', serif", fontWeight: 300, fontSize: 'clamp(44px, 5vw, 64px)', color: '#3D332A', lineHeight: 0.95, letterSpacing: '-0.02em' }}>
            From discovery <em style={{ fontWeight: 700 }}>to dominance.</em>
          </h2>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 36 }}>
          {[
            ['01', 'Discovery Call', "We learn your brand, your goals, and your current challenges in a complimentary 1-hour strategy session."],
            ['02', 'Custom Strategy', 'We build a tailored marketing roadmap aligned to your specific growth targets and budget.'],
            ['03', 'Launch & Scale', 'We execute, optimize, and scale — delivering measurable results month over month.'],
          ].map(([n, title, desc]) => (
            <div key={n} style={{ background: '#FBF8F1', padding: '40px 32px', borderRadius: 2, border: '1px solid rgba(168,139,92,0.2)' }}>
              <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 56, fontWeight: 300, color: '#A88B5C', lineHeight: 1, marginBottom: 20 }}>{n}</div>
              <h3 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 26, fontWeight: 600, color: '#3D332A', marginBottom: 12, lineHeight: 1.2 }}>{title}</h3>
              <p style={{ fontFamily: "'Jost', sans-serif", fontSize: 14, fontWeight: 300, color: '#6B5C4E', lineHeight: 1.75, letterSpacing: '0.02em' }}>{desc}</p>
            </div>
          ))}
        </div>
        <div style={{ textAlign: 'center', marginTop: 64 }}>
          <p style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 20, fontStyle: 'italic', fontWeight: 300, color: '#6B5C4E', marginBottom: 28, letterSpacing: '0.005em' }}>
            Limited client spots available. The Vault works exclusively with brands ready to lead their market.
          </p>
          <button onClick={() => onNavigate('contact')} style={{ background: '#3D332A', color: '#FBF8F1', border: 'none', padding: '16px 48px', fontFamily: "'Jost', sans-serif", fontSize: 9, fontWeight: 400, letterSpacing: '0.26em', textTransform: 'uppercase', cursor: 'pointer', borderRadius: 2 }}>Book Your Discovery Call</button>
        </div>
      </div>
    </section>

    {/* FAQ / Objection handler — ivory */}
    <section style={{ background: '#FBF8F1', padding: '120px 48px', borderTop: '1px solid rgba(168,139,92,0.18)' }}>
      <div style={{ maxWidth: 1100, margin: '0 auto' }}>
        <div style={{ textAlign: 'center', marginBottom: 64 }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 14, marginBottom: 24 }}>
            <span style={{ display: 'inline-block', width: 32, height: 1, background: '#A88B5C' }}></span>
            <span style={{ fontFamily: "'Jost', sans-serif", fontSize: 9, fontWeight: 400, letterSpacing: '0.3em', textTransform: 'uppercase', color: '#A88B5C' }}>Before You Book</span>
            <span style={{ display: 'inline-block', width: 32, height: 1, background: '#A88B5C' }}></span>
          </div>
          <h2 style={{ fontFamily: "'Cormorant Garamond', serif", fontWeight: 300, fontSize: 'clamp(36px, 4vw, 54px)', color: '#3D332A', lineHeight: 1.05, letterSpacing: '-0.015em' }}>
            Honest answers <em style={{ fontWeight: 700 }}>to fair questions.</em>
          </h2>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 48 }}>
          {[
            ["How is The Vault different from other agencies?", "We're a boutique by design. You won't be handed off to a junior account manager — you work directly with the people building your strategy. We take fewer clients so each one gets senior attention and a strategy built around their brand DNA, not a template."],
            ["Who do you work best with?", "Owners and operators of high-end, experience-driven businesses — gyms, restaurants, boutique hotels, lifestyle clubs, and retail boutiques — who are committed to growth and prepared to invest in marketing as a strategic asset, not a line-item expense."],
            ["What does engagement look like?", "Most engagements begin with a complimentary 1-hour discovery call. From there, we build a custom roadmap aligned to your specific growth targets and budget. We share scope and pricing transparently before any commitment."],
            ["Will you guarantee specific results?", "We won't promise numbers we can't control — and you should be skeptical of any agency that does. What we will commit to is sharp strategy, transparent reporting, and a relentless focus on the metrics that drive your business: awareness, foot traffic, and revenue."],
          ].map(([q, a], i) => (
            <div key={i} style={{ padding: '32px 0', borderTop: '1px solid rgba(168,139,92,0.2)' }}>
              <div style={{ display: 'flex', alignItems: 'baseline', gap: 14, marginBottom: 18 }}>
                <span style={{ fontFamily: "'Jost', sans-serif", fontSize: 9, fontWeight: 400, letterSpacing: '0.22em', color: '#A88B5C' }}>{`0${i+1}`}</span>
                <h3 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 22, fontWeight: 600, color: '#3D332A', lineHeight: 1.3, marginBottom: 4 }}>{q}</h3>
              </div>
              <p style={{ fontFamily: "'Jost', sans-serif", fontSize: 14, fontWeight: 300, color: '#6B5C4E', lineHeight: 1.85, letterSpacing: '0.02em', paddingLeft: 28 }}>{a}</p>
            </div>
          ))}
        </div>
      </div>
    </section>

    <Footer onNavigate={onNavigate} />
  </div>
);

const App = () => {
  const [page, setPage] = React.useState('home');

  const navigate = (p) => {
    setPage(p);
    window.scrollTo({ top: 0, behavior: 'instant' });
  };

  const renderPage = () => {
    switch(page) {
      case 'home':     return <HomePage onNavigate={navigate} />;
      case 'services': return <><Services onNavigate={navigate} /><Footer onNavigate={navigate} /></>;
      case 'work':     return <><WorkPage onNavigate={navigate} /><Footer onNavigate={navigate} /></>;
      case 'about':    return <><AboutPage onNavigate={navigate} /><Footer onNavigate={navigate} /></>;
      case 'contact':  return <><ContactPage /><Footer onNavigate={navigate} /></>;
      default:         return <HomePage onNavigate={navigate} />;
    }
  };

  return (
    <div>
      <Header currentPage={page} onNavigate={navigate} />
      {renderPage()}
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
